<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gradient Border Playground</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0f0f13;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    padding: 48px 24px;
    font-family: system-ui, sans-serif;
    color: #fff;
  }

  h1 {
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #666;
  }

  .grid {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .option {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .label {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #555;
  }

  /* ── Option A: Rainbow spin ── */
  .card-a-wrap {
    padding: 2px;
    border-radius: 16px;
    background: conic-gradient(from 0deg, #ff0080, #ff8c00, #ffe600, #00c853, #00b0ff, #d500f9, #ff0080);
    animation: spin 4s linear infinite;
  }

  @keyframes spin {
    to { background: conic-gradient(from 360deg, #ff0080, #ff8c00, #ffe600, #00c853, #00b0ff, #d500f9, #ff0080); }
  }

  /* ponytail: conic-gradient rotation can't animate directly — use a pseudo-element hack */
  .card-a-wrap {
    position: relative;
    border-radius: 16px;
    padding: 2px;
    background: transparent;
  }

  .card-a-wrap::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 18px;
    background: conic-gradient(from var(--angle, 0deg), #ff0080, #ff8c00, #ffe600, #00c853, #00b0ff, #d500f9, #ff0080);
    animation: border-spin 4s linear infinite;
    z-index: 0;
  }

  @property --angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }

  @keyframes border-spin {
    to { --angle: 360deg; }
  }

  /* ── Option B: Aurora (soft diagonal) ── */
  .card-b-wrap {
    padding: 2px;
    border-radius: 16px;
    background: linear-gradient(135deg, #a78bfa, #38bdf8, #34d399, #a78bfa);
    background-size: 300% 300%;
    animation: aurora 6s ease infinite;
  }

  @keyframes aurora {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ── Option C: Neon pulse ── */
  .card-c-wrap {
    padding: 2px;
    border-radius: 16px;
    background: linear-gradient(90deg, #f72585, #7209b7, #3a0ca3, #4361ee, #4cc9f0);
    box-shadow: 0 0 12px 2px rgba(247,37,133,0.4), 0 0 24px 4px rgba(67,97,238,0.3);
    animation: pulse-glow 3s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 12px 2px rgba(247,37,133,0.4), 0 0 24px 4px rgba(67,97,238,0.3); }
    50%       { box-shadow: 0 0 20px 6px rgba(247,37,133,0.7), 0 0 40px 10px rgba(67,97,238,0.5); }
  }

  /* ── Shared card inner ── */
  .card-inner {
    position: relative;
    z-index: 1;
    background: #0f0f13;
    border-radius: 14px;
    padding: 32px 40px;
    width: 240px;
    text-align: center;
  }

  .card-inner h2 {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 8px;
    color: #e2e2e2;
  }

  .card-inner p {
    font-size: 0.8rem;
    color: #555;
    line-height: 1.5;
  }

  /* pick button */
  .pick-btn {
    margin-top: 4px;
    padding: 6px 18px;
    border-radius: 6px;
    border: 1px solid #333;
    background: transparent;
    color: #888;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .pick-btn:hover { border-color: #fff; color: #fff; }
  .pick-btn.chosen { border-color: #a78bfa; color: #a78bfa; }

  #result {
    min-height: 24px;
    font-size: 0.85rem;
    color: #a78bfa;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<h1>Gradient Border Styles</h1>

<div class="grid">

  <!-- A: Rainbow Spin -->
  <div class="option">
    <div class="card-a-wrap">
      <div class="card-inner">
        <h2>Option A</h2>
        <p>Rainbow Spin<br>Conic gradient, full rotation</p>
      </div>
    </div>
    <span class="label">Rainbow Spin</span>
    <button class="pick-btn" onclick="pick('A', this)">Choose A</button>
  </div>

  <!-- B: Aurora -->
  <div class="option">
    <div class="card-b-wrap">
      <div class="card-inner">
        <h2>Option B</h2>
        <p>Aurora Drift<br>Soft animated diagonal</p>
      </div>
    </div>
    <span class="label">Aurora Drift</span>
    <button class="pick-btn" onclick="pick('B', this)">Choose B</button>
  </div>

  <!-- C: Neon Pulse -->
  <div class="option">
    <div class="card-c-wrap">
      <div class="card-inner">
        <h2>Option C</h2>
        <p>Neon Pulse<br>Static gradient + glowing shadow</p>
      </div>
    </div>
    <span class="label">Neon Pulse</span>
    <button class="pick-btn" onclick="pick('C', this)">Choose C</button>
  </div>

</div>

<div id="result"></div>

<script>
  function pick(name, btn) {
    document.querySelectorAll('.pick-btn').forEach(b => b.classList.remove('chosen'));
    btn.classList.add('chosen');
    const desc = { A: 'Rainbow Spin', B: 'Aurora Drift', C: 'Neon Pulse' };
    document.getElementById('result').textContent = `You chose Option ${name} — ${desc[name]}`;
  }
</script>
</body>
</html>
